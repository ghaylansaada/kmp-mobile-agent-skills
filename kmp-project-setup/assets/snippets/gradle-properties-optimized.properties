# =============================================================================
# Optimized gradle.properties for KMP Project
# =============================================================================
# Architecture: Single-module (composeApp)
# Targets: Android, iosArm64, iosSimulatorArm64
# =============================================================================

# =============================================================================
# Gradle Daemon & JVM Configuration
# =============================================================================

# Gradle daemon JVM arguments
# - 4096M heap is the recommended minimum for KMP projects with Compose Multiplatform
# - UTF-8 encoding prevents platform-dependent resource processing issues
# - G1GC provides better pause times for long-running daemon processes
# - MaxMetaspaceSize prevents unbounded metaspace growth across builds
org.gradle.jvmargs=-Xmx4096M \
  -Dfile.encoding=UTF-8 \
  -XX:+UseG1GC \
  -XX:MaxMetaspaceSize=512M \
  -XX:+HeapDumpOnOutOfMemoryError

# Kotlin compiler daemon JVM arguments
# - Separate process from Gradle daemon; handles all Kotlin compilation
# - 3072M required for KSP processing across multiple targets
#   (kspAndroid, kspIosArm64, kspIosSimulatorArm64, kspCommonMainMetadata)
kotlin.daemon.jvmargs=-Xmx3072M -XX:+UseG1GC

# =============================================================================
# Gradle Performance
# =============================================================================

# Enable build caching to reuse task outputs across builds
# Critical for KMP: compilation outputs for each target are cached independently
org.gradle.caching=true

# Disable configuration cache
# Known incompatibilities with KMP code-generation plugins (Room KSP, Ktorfit)
# Re-evaluate when upgrading to future plugin versions
org.gradle.configuration-cache=false

# Enable parallel task execution
# KMP benefits significantly: Android and iOS compilations run concurrently
org.gradle.parallel=true

# Limit worker threads to avoid memory pressure
# Set to (physical CPU cores - 1); adjust based on CI/local machine specs
# org.gradle.workers.max=4

# Enable Gradle file system watching for faster up-to-date checks
org.gradle.vfs.watch=true

# =============================================================================
# Kotlin Multiplatform
# =============================================================================

# Suppress AGP/KMP compatibility warnings
kotlin.mpp.androidGradlePluginCompatibility.nowarn=true

# Apply the default KMP target hierarchy template automatically
kotlin.mpp.applyDefaultHierarchyTemplate=true

# Opt-in to Kotlin incremental compilation for KMP
kotlin.incremental.multiplatform=true

# =============================================================================
# Android
# =============================================================================

# Use AndroidX libraries (required for Room and all modern libraries)
android.useAndroidX=true

# Non-transitive R classes reduce APK size and prevent resource ID collisions
android.nonTransitiveRClass=true

# Enable resource optimizations for release builds
android.enableResourceOptimizations=true

# =============================================================================
# Compose
# =============================================================================

# Compose compiler metrics and reports (enable for optimization analysis)
# Uncomment to generate stability reports in build/compose_metrics/
# composeCompilerReports=true
# composeCompilerMetrics=true

# =============================================================================
# KSP
# =============================================================================

# Enable KSP incremental processing for faster rebuilds
ksp.incremental=true
