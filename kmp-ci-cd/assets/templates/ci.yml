# =============================================================================
# GitHub Actions CI workflow template for KMP Mobile Template
# Place at: .github/workflows/ci.yml
# Runs on every push to main/develop and on pull requests.
#
# For GitLab CI/CD, use assets/snippets/gitlab-ci.yml instead.
#
# IMPORTANT:
#   - Android job runs on ubuntu-latest (cheap). iOS job runs on macos-15 (10x cost).
#   - Configuration cache is OFF (KSP incompatible).
#   - --no-daemon on all Gradle commands (ephemeral CI runners).
#   - ~/.konan/ cached separately for iOS -- saves 10+ min per run.
# =============================================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"

jobs:
  # =========================================================================
  # Android Build + Test (Ubuntu)
  # =========================================================================
  android-build:
    name: Android Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .kotlin/
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --no-daemon

      - name: Run lint
        run: ./gradlew :composeApp:lintDebug --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: composeApp/build/reports/tests/
          retention-days: 7

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-results
          path: composeApp/build/reports/lint-results-debug.html
          retention-days: 7

  # =========================================================================
  # iOS Build + Test (macOS -- required for Xcode)
  # =========================================================================
  ios-build:
    name: iOS Build & Test
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .kotlin/
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Restore Kotlin/Native cache
        uses: actions/cache@v4
        with:
          path: ~/.konan/
          key: konan-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build KMP shared tests
        run: ./gradlew :composeApp:iosSimulatorArm64Test --no-daemon

      - name: Build KMP framework (debug, simulator)
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --no-daemon

      - name: Build Xcode project
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            ENABLE_BITCODE=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run XCTest
        run: |
          xcodebuild test \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            ENABLE_BITCODE=NO \
            CODE_SIGNING_ALLOWED=NO
