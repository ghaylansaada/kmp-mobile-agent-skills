# =============================================================================
# GitHub Actions iOS Release workflow template for KMP Mobile Template
# Place at: .github/workflows/release-ios.yml
# Triggers on version tags (v*) or manual dispatch.
# For GitLab CI/CD, use assets/snippets/gitlab-ci.yml instead.
#
# IMPORTANT:
#   - MUST run on macos-15 (iOS builds require Xcode).
#   - Do NOT use embedAndSignAppleFrameworkForXcode on CI -- it depends on
#     Xcode environment variables. Use linkReleaseFrameworkIosArm64 instead.
#   - Bitcode is deprecated (Xcode 14+). ENABLE_BITCODE=NO everywhere.
#   - ~/.konan/ cache is critical -- Kotlin/Native compilation is ~10x slower
#     than JVM and recompiles from scratch without cache.
#   - Build number must strictly increase or TestFlight rejects the upload.
#   - Build number is read from gradle.properties (bumped by scripts/bump-version.sh).
#     Do NOT derive build number from tag count -- deleted tags cause collisions.
# =============================================================================
name: Release iOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g., 1.0.0)"
        required: true
      build_number:
        description: "Build number (e.g., 2)"
        required: true

env:
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"

jobs:
  release-ios:
    name: Build & Release iOS
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .kotlin/
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Restore Kotlin/Native cache
        uses: actions/cache@v4
        with:
          path: ~/.konan/
          key: konan-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION_NAME="${GITHUB_REF#refs/tags/v}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          BUILD_NUMBER=$(grep "app.versionCode" gradle.properties | cut -d'=' -f2)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Use manual version
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "VERSION_NAME=${{ github.event.inputs.version_name }}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${{ github.event.inputs.build_number }}" >> $GITHUB_ENV

      - name: Install signing certificate
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$IOS_CERTIFICATE_BASE64" | base64 -d > certificate.p12
          security import certificate.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}

      - name: Run KMP shared tests
        run: ./gradlew :composeApp:iosSimulatorArm64Test --no-daemon

      - name: Build KMP framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 -Pflavor=prod --no-daemon

      - name: Set version in Xcode project
        run: |
          cd iosApp
          agvtool new-version -all "${{ env.BUILD_NUMBER }}"
          agvtool new-marketing-version "${{ env.VERSION_NAME }}"

      - name: Archive
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -archivePath build/iosApp.xcarchive \
            -destination "generic/platform=iOS" \
            ENABLE_BITCODE=NO \
            MARKETING_VERSION="${{ env.VERSION_NAME }}" \
            CURRENT_PROJECT_VERSION="${{ env.BUILD_NUMBER }}"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/iosApp.xcarchive \
            -exportOptionsPlist iosApp/ExportOptions.plist \
            -exportPath build/ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ipa/iosApp.ipa
          retention-days: 30

      - name: Upload dSYMs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsyms
          path: build/iosApp.xcarchive/dSYMs/
          retention-days: 90

      - name: Upload to TestFlight
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}" | base64 -d > AuthKey.p8
          xcrun notarytool store-credentials "AC_API_KEY" \
            --key AuthKey.p8 \
            --key-id "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --issuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
          xcrun altool --upload-app \
            --type ios \
            --file build/ipa/iosApp.ipa \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload dSYMs to Firebase Crashlytics
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          npm install -g firebase-tools
          echo "$GOOGLE_APPLICATION_CREDENTIALS" | base64 -d > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          firebase crashlytics:symbols:upload \
            --app "${{ secrets.FIREBASE_IOS_APP_ID }}" \
            build/iosApp.xcarchive/dSYMs

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true
